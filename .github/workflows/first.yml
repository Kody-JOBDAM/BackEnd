name: CI
 
on:
  push:
    branches: [ "**" ]
 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
 
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
 
      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
 
      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
 
      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew
 
      - name: 빌드
        run: ./gradlew build -x test
 
      - name: 테스트 실행
        run: ./gradlew test
 
      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
